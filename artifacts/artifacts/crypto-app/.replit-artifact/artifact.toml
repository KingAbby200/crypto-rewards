kind = "web"
previewPath = "/"
title = "Crypto Rewards Dashboard"
version = "1.0.0"
id = "artifacts/crypto-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25012
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/crypto-app run dev"

[services.env]
PORT = "25012"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/crypto-app", "run", "build"]
publicDir = "artifacts/crypto-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
